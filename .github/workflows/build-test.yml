name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build (default features)
      run: cargo build --verbose
    - name: Run tests (default features)
      run: cargo test --verbose
    - name: Build (openssl feature)
      run: cargo build --verbose --features openssl
    - name: Run tests (openssl feature)
      run: cargo test --verbose --features openssl
